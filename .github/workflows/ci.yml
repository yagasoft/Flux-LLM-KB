name: ci

on:
  push:
    branches: ["main", "feature/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e .[dev]
      - name: Test
        run: python -m pytest tests -q
      - name: Lint migrations
        run: flux-kb lint
